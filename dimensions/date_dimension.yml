unique_name: date_dimension
object_type: dimension
label: Date Dimension
calculation_groups:
  - unique_name: previous_current
    label: Previous/Current
    calculated_members:
      - unique_name: Current
        template: Current
        use_input_metric_format: true
      - unique_name: Previous
        template: Previous
        use_input_metric_format: true
hierarchies:
  - unique_name: Date Dimension Hierarchy
    label: Year-Quarter-Month-Day Hierarchy
    levels:
      - unique_name: year
      - unique_name: quarter_id
      - unique_name: month_name
      - unique_name: day_ID
  - unique_name: date
    label: date
    levels:
      - unique_name: year
      - unique_name: quarter_id
      - unique_name: month_name
      - unique_name: day_ID
level_attributes:
  - unique_name: day_ID
    label: Day ID
    contains_unique_names: false
    dataset: dim_date_day
    is_unique_key: true
    key_columns:
      - day_id
    name_column: day_id_expanded
    time_unit: day
  - unique_name: year
    label: Year
    contains_unique_names: false
    dataset: dim_date_day
    key_columns:
      - year
    name_column: year
    time_unit: year
  - unique_name: quarter_id
    label: Quarter
    contains_unique_names: false
    dataset: dim_date_day
    key_columns:
      - quarter_id
    name_column: quarter_id
    time_unit: quarter
  - unique_name: month_name
    label: Month Name
    contains_unique_names: false
    dataset: dim_date_day
    key_columns:
      - month_id
    name_column: month_name
    sort_column: month_of_year
    time_unit: month
type: time
