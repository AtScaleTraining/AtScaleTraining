  - name: sales_reasons
    data_type: string
  - name: productkey
    data_type: decimal(38,0)
  - name: product_info
    data_type: string
  - name: orderdatekey
    data_type: decimal(38,0)
  - name: customerkey
    data_type: decimal(38,0)
  - name: orderquantity
    data_type: decimal(38,0)
  - name: unitprice
    data_type: double
  - name: salesamount
    data_type: double
  - name: taxamt
    data_type: double
  - name: orderdate
    data_type: string
  - name: shipdatekey
    data_type: decimal(38,0)
  - name: currencykey
    data_type: decimal(38,0)
  - name: Counter
    data_type: decimal(1,0)
    sql: '1'
  - name: Tax_Rate
    data_type: double
    sql: '"taxamt"/"salesamount"'
  - name: Color
    data_type: string
    sql: >-
      CAST( REGEXP_SUBSTR("product_info", 'color:([^,]+)', 1, 1, 'e', 1) AS TEXT
      )
  - name: Style
    data_type: string
    sql: >-
      CAST( REGEXP_SUBSTR("product_info", 'style:([^,]+)', 1, 1, 'e', 1) AS TEXT
      )
  - name: Weight
    data_type: string
    sql: >-
      CAST( REGEXP_SUBSTR("product_info", 'weight:([^,]+)', 1, 1, 'e', 1) AS
      TEXT )
  - name: Size
    data_type: string
    sql: >-
      CAST( REGEXP_SUBSTR("product_info", 'size:([^,]+)', 1, 1, 'e', 1) AS TEXT
      )
