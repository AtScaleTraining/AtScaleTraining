unique_name: factinternetsales
object_type: dataset
label: factinternetsales
columns:
  - name: salesordernumber
    data_type: string
  - name: salesorderlinenumber
    data_type: int
  - name: sales_reasons
    data_type: string
  - name: productkey
    data_type: int
  - name: product_info
    data_type: string
  - name: orderdatekey
    data_type: int
  - name: customerkey
    data_type: int
  - name: orderquantity
    data_type: int
  - name: unitprice
    data_type: float
  - name: salesamount
    data_type: float
  - name: taxamt
    data_type: float
  - name: orderdate
    data_type: string
  - name: shipdatekey
    data_type: int
  - name: currencykey
    data_type: int
  - name: counter
    data_type: int
    sql: '1'
  - name: tax_rate
    data_type: decimal
    sql: 'round((taxamt / salesamount) :: numeric, 4)'
  - name: color
    data_type: string
    sql: |-
      CAST(
      SUBSTRING(
      product_info ,
      '(?:^|,)color:([^,]+)'
      ) AS TEXT
      )
  - name: size
    data_type: string
    sql: |-
      CAST(
      SUBSTRING(
      product_info ,
      '(?:^|,)size:([^,]+)'
      ) AS TEXT
      )
  - name: weight
    data_type: string
    sql: |-
      CAST(
      SUBSTRING(
      product_info ,
      '(?:^|,)weight:([^,]+)'
      ) AS TEXT
      )
  - name: style
    data_type: string
    sql: |-
      CAST(
      SUBSTRING(
      product_info ,
      '(?:^|,)style:([^,]+)'
      ) AS TEXT
      )
connection_id: con_atscale_public
