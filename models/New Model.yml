unique_name: New Model
object_type: model
label: New Model
dimensions:
  - Size
  - Style
  - Sales_Amount
  - Tax_Rate
  - Counter
metrics:
  - unique_name: m_factinternetsales_salesamount_sum
  - unique_name: m_factinternetsales_taxamt_avg
  - unique_name: m_factinternetsales_orderquantity_sum
  - unique_name: m_factinternetsales_customerkey_dc
  - unique_name: m_factinternetsales_customerkey_dce
relationships:
  - unique_name: >-
      factinternetsales_orderdatekey_to_dim_date_day_dimension_dim_date_day_dimension
      Level
    from:
      dataset: dsPG_factinternetsales
      join_columns:
        - orderdatekey
    role_play: Order {0}
    to:
      dimension: dim_date_day_dimension
      level: dim_date_day_dimension Level
  - unique_name: dsPG_factinternetsales_customerkey_to_customer_dim_customer_name
    from:
      dataset: dsPG_factinternetsales
      join_columns:
        - customerkey
    to:
      dimension: gender_dimension
      level: customer_name
  - unique_name: dsPG_factinternetsales_productkey_to_Product Dimension_Product Name
    from:
      dataset: dsPG_factinternetsales
      join_columns:
        - productkey
    to:
      dimension: Product Dimension
      level: Product Name
  - unique_name: >-
      dsPG_factinternetsales_shipdatekey_to_dim_date_day_dimension_dim_date_day_dimension
      Level
    from:
      dataset: dsPG_factinternetsales
      join_columns:
        - shipdatekey
    role_play: Ship {0}
    to:
      dimension: dim_date_day_dimension
      level: dim_date_day_dimension Level
