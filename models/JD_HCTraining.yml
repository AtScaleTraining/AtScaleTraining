unique_name: JD_HCTraining
object_type: model
label: JD_HCTraining
aggregates:
  - unique_name: order_metrics
    label: Order Metrics
    attributes:
      - name: Color_Level
        dimension: Color
      - name: Size_Level
        dimension: Size
      - name: Style_Level
        dimension: Style
      - name: Weight_Level
        dimension: Weight
    metrics:
      - m_factinternetsales_orderquantity_sum
      - m_factinternetsales_salesamount_sum
  - unique_name: jd_test_agg
    label: JD Test Agg
    attributes:
      - name: occupation
        dimension: customer_dim
      - name: datefirstpurchase
        dimension: customer_dim
      - name: Product Category
        dimension: Product Dimension
      - name: year
        dimension: day_dimension
        relationships_path:
          - factinternetsales_orderdatekey_to_day_dimension_day_dimension Level
    metrics:
      - m_factinternetsales_salesamount_sum
dimensions:
  - Style
  - Color
  - Weight
  - Size
metrics:
  - unique_name: m_factinternetsales_salesamount_sum
  - unique_name: m_factinternetsales_taxamt_avg
  - unique_name: m_factinternetsales_customerkey_dc
  - unique_name: m_factinternetsales_taxamt_sum
  - unique_name: m_factinternetsales_orderquantity_sum
relationships:
  - unique_name: factinternetsales_orderdatekey_to_day_dimension_day_dimension Level
    from:
      dataset: factinternetsales
      join_columns:
        - orderdatekey
    role_play: Order {0}
    to:
      dimension: day_dimension
      level: day_dimension Level
  - unique_name: factinternetsales_customerkey_to_customer_dim_customer_name
    from:
      dataset: factinternetsales
      join_columns:
        - customerkey
    to:
      dimension: customer_dim
      level: customer_name
  - unique_name: factinternetsales_productkey_to_Product Dimension_Product Name
    from:
      dataset: factinternetsales
      join_columns:
        - productkey
    to:
      dimension: Product Dimension
      level: Product Name
  - unique_name: factinternetsales_shipdatekey_to_day_dimension_day_dimension Level
    from:
      dataset: factinternetsales
      join_columns:
        - shipdatekey
    role_play: Ship {0}
    to:
      dimension: day_dimension
      level: day_dimension Level
  - unique_name: shipping_table_shipdatekey_to_day_dimension_day_dimension Level
    from:
      dataset: shipping_table
      join_columns:
        - shipdatekey
    to:
      dimension: day_dimension
      level: day_dimension Level
